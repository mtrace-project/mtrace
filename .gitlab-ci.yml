variables:
  GOPRIVATE: "gitlab.m31.com/*"

style-check:
  stage: static-analysis
  image: golang:1.26-alpine
  tags:
    - shared
  rules:
    - if: $CI_COMMIT_BRANCH != "docs"
  before_script:
    - go install mvdan.cc/gofumpt@latest
    - cd mtrace
  script:
    - gofumpt -l -e .

linter:
  stage: static-analysis
  image: golangci/golangci-lint:latest-alpine
  tags:
    - shared
  rules:
    - if: $CI_COMMIT_BRANCH != "docs"
  before_script:
    - cd mtrace
  script:
    - golangci-lint run -v --timeout=10m -j 2 --new-from-rev=HEAD~

unit-tests:
  stage: test
  image: golang:1.26-alpine
  tags:
    - shared
  rules:
    - if: $CI_COMMIT_BRANCH != "docs"
  before_script:
    - cd mtrace
  script:
    - go test ./...

# Test build with goreleaser in snapshot mode, only on develop branch
goreleaser-build-test:
  stage: build
  image: 
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  tags:
    - shared
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  variables:
    GIT_DEPTH: 0
  script:
    - cd mtrace
    - goreleaser release --clean --snapshot --skip=sign

# Release start only when there is a tag
goreleaser-build:
  stage: build
  image: 
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  tags:
    - shared
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ # Release only on tags like v1.2.3
  variables:
    GIT_DEPTH: 0
    GIT_FETCH_EXTRA_FLAGS: --prune --quiet --tags
    GORELEASER_CURRENT_TAG: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache gnupg
    - cd mtrace
    - gpg --batch --import "$GPG_PRIVATE_KEY"
  script:
    - goreleaser release --clean
  artifacts:
    name: "${CI_PROJECT_NAME}_${CI_COMMIT_TAG}_dist"
    expire_in: 8 weeks
    paths:
      - mtrace/dist/*.zip
      - mtrace/dist/*.tar.zst
      - mtrace/dist/*.tar
      - mtrace/dist/*.json
      - mtrace/dist/*.md
      - mtrace/dist/*.txt
      - mtrace/dist/*.sig
