version: "2"

run:
  timeout: 5m
  concurrency: 4

linters:
  enable:
    - gocyclo
    - staticcheck
    - errcheck
    - govet
    - unused
    - bodyclose
    - noctx
    - asasalint
    - revive
    - gosec
    - nilerr
    - errorlint
    - errname
    - contextcheck
    - makezero
    - sqlclosecheck
    - rowserrcheck
    - prealloc
  settings:
    gocyclo:
      min-complexity: 20
    revive:
      confidence: 0.8
